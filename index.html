<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forbes Result Checker</title>
    <!-- css links -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/queries.css">
    <link rel="icon" type="image/x-icon" href="./img/college-logo.jpg">
</head>
<body>
    <div class="form-container">
        <div class="form-title">
            <div class="form-logo">
                <img src="./img/college-logo.jpg" alt="logo">
            </div>
            <h2>Forbes Royal College Result Portal</h2>
        </div>
        <div class="form-content">
            <input type="text" id="studentId" placeholder="Enter Student ID (e.g., S123)" oninput="clearResult()">
            <button onclick="checkResult()">Check Result</button>
            <div id="result" class="result"></div>
        </div>
        <div class="form-note">
            <li>Results obtained are meant to give insights into student's proficiency levels.</li>
            <li>The outcome will be utilized to design your child's personalized learning experience.</li>
        </div>
    </div>
    <script src="./js/app.js"></script>
</body>
</html>
